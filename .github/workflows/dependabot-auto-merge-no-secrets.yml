name: Dependabot auto-merge (no secrets — startup_failure smoke test)

# This workflow deliberately omits LUCOS_CI_APP_ID and LUCOS_CI_PRIVATE_KEY to
# verify that missing required secrets produce startup_failure rather than
# silently falling back to GITHUB_TOKEN.
#
# After .github#60 is released, update the @ref below to the release tag.
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dependabot:
    uses: lucas42/.github/.github/workflows/reusable-dependabot-auto-merge.yml@kill-github-token-fallback
    # Intentionally no secrets: block — required: true must produce startup_failure
